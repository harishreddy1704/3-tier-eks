name: 3-Tier EKS CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION:     us-east-1
  ECR_REGISTRY:   917714910664.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: flask-api
  EKS_CLUSTER:    eksdemo
  NAMESPACE:      three-tier

jobs:
  unit-test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

     - name: Install dependencies
       run: pip install -r app/backend/requirements.txt

     - name: Run tests
       working-directory: app/backend        # ← run pytest from here
       env:
         PYTHONPATH: .                        # ← makes "from app import app" work
         DB_HOST: localhost
         DB_PORT: "5432"
         DB_NAME: testdb
         DB_USER: test
         DB_PASSWORD: test
       run: pytest tests/ --cov=. -v

  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-secret:
    name: Sync DB secret to K8s
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Fetch DB credentials from Secrets Manager
        id: db
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id eksdemo/db-credentials \
            --query SecretString --output text)
          echo "host=$(echo $SECRET     | jq -r .host)"     >> $GITHUB_OUTPUT
          echo "dbname=$(echo $SECRET   | jq -r .dbname)"   >> $GITHUB_OUTPUT
          echo "username=$(echo $SECRET | jq -r .username)" >> $GITHUB_OUTPUT
          echo "password=$(echo $SECRET | jq -r .password)" >> $GITHUB_OUTPUT

      - name: Apply K8s secret
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic db-credentials \
            --namespace ${{ env.NAMESPACE }} \
            --from-literal=host="${{ steps.db.outputs.host }}" \
            --from-literal=port="5432" \
            --from-literal=dbname="${{ steps.db.outputs.dbname }}" \
            --from-literal=username="${{ steps.db.outputs.username }}" \
            --from-literal=password="${{ steps.db.outputs.password }}" \
            --save-config \
            --dry-run=client -o yaml | kubectl apply -f -

  update-image-tag:
    name: Update image tag in Helm values
    runs-on: ubuntu-latest
    needs: [build, deploy-secret]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update image tag in values.yaml
        run: |
          IMAGE_TAG=${{ needs.build.outputs.image_tag }}
          sed -i "s/tag: .*/tag: \"${IMAGE_TAG}\"/" helm/3tier-app/values.yaml

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/3tier-app/values.yaml
          git commit -m "ci: update backend image tag to ${{ needs.build.outputs.image_tag }}"
          git push
